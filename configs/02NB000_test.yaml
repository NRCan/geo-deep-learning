seed_everything: 42

trainer:
  accelerator: "gpu"
  devices: 1
  strategy: auto
  precision: "16-mixed"
  sync_batchnorm: false
  logger:
    class_path: lightning.pytorch.loggers.mlflow.MLFlowLogger
    init_args:
      save_dir: /gpfs/fs5/nrcan/nrcan_geobase/work/transfer/work/deep_learning/gdl_projects/geo-deep-learning/logs
      log_model: true
      experiment_name: "02NB000"
      run_name: "unetplus_full_dataset"
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: "val_loss"
        #monitor: "val_loss_weighted"
        mode: "min"
        save_top_k: 3
        save_last: true
        filename: "model-{epoch:02d}-{val_loss:.3f}"
    - class_path: tools.callbacks.segmentation_visualization.VisualizationCallback
      init_args:
        max_samples: 6
  min_epochs: 100
  max_epochs: 150
  val_check_interval: 1.0
  check_val_every_n_epoch: 1

model:
  class_path: tools.water_extraction.segmentation_task.WaterExtractionSegmentation
  init_args:
    encoder: "resnet34"
    image_size: [512, 512]
    in_channels: 3  # TWI, nDSM, intensity
    max_samples: 8
    num_classes: 2  # Background (0) and Water (1)
    ignore_index: -1  # Ignore pixels outside AOI boundaries (MIoU)
    loss:
      class_path: segmentation_models_pytorch.losses.DiceLoss
      init_args:
        mode: multiclass
        from_logits: true
        ignore_index: -1
    optimizer:
      class_path: torch.optim.Adam
      init_args:
        lr: 1e-3
    scheduler_config:
      interval: "epoch"
      frequency: 1
      monitor: "val_loss"
    class_labels: ["background", "water"]
    class_colors: ["#2E2E2E", "#0077BE"]  # Dark gray for background, blue for water
    weights_from_checkpoint_path: null

data:
  class_path: tools.water_extraction.elevation_stack_datamodule.ElevationStackDataModule
  init_args:
    # Required by parent CSVDataModule
    #csv_root_folder: "/gpfs/fs5/nrcan/nrcan_geobase/work/transfer/work/deep_learning/gdl_projects/geo-deep-learning/data/preprocessed_02NB000"
    patches_root_folder: ""
    # ElevationStackDataModule specific parameters
    input_folders: 
      - "/gpfs/fs5/nrcan/nrcan_geobase/work/transfer/work/deep_learning/gdl_projects/geo-deep-learning/data/02NB000"
    output_root: "/gpfs/fs5/nrcan/nrcan_geobase/work/transfer/work/deep_learning/gdl_projects/geo-deep-learning/data/preprocessed_02NB000"
    #csv_path: "/gpfs/fs5/nrcan/nrcan_geobase/work/transfer/work/deep_learning/gdl_projects/geo-deep-learning/data/preprocessed_02NB000/02NB000_water_extraction.csv"
    #csv_infer_path: "/gpfs/fs5/nrcan/nrcan_geobase/work/transfer/work/deep_learning/gdl_projects/geo-deep-learning/data/preprocessed_02NB000/02NB000_water_extraction_infer.csv"
    include_intensity: true
    stride: 512
    patch_size: [512, 512]
    batch_size: 8  # Increased for full training
    num_workers: 16  # Utilize more CPU cores
    regenerate_csv: false
    min_water_pixels: 1
    mean:
    - 3.9649343334774128
    - 8.978241985499926
    - 137.23464626784536
    std:
    - 2.2158924903309316
    - 6.302609887417542
    - 63.83268941767069
    test_only: true

# Training configuration
ckpt_path: null

# Optional: Resume from checkpoint
# ckpt_path: "/path/to/checkpoint.ckpt"